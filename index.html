<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home | GitHub Issue Tracker</title>
    <!-- Custom css styles link -->
    <link rel="stylesheet" href="./styles/style.css" />
    <!-- tailwind + daisyUi cdn link -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font awesome cdn link -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

        <div class="navbar w-9/10 mx-auto">
          <div class="flex-1 flex items-center">
            <img class="w-9 h-9" src="./assets/github-logo.png" alt="">
            <a class="btn btn-ghost text-xl">GitHub Issues Tracker</a>
          </div>
          <div class="flex gap-2">
            <input
