<!doctype html>
<html lang="en" class="bg-[#ECE4FF]">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home | GitHub Issue Tracker</title>
    <!-- Custom css styles link -->
    <link rel="stylesheet" href="./styles/style.css" />
    <!-- tailwind + daisyUi cdn link -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font awesome cdn link -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <header>
      <nav class="bg-base-100 shadow-sm mb-14">
        <div class="navbar w-9/10 mx-auto">
          <div class="flex-1 flex items-center">
            <img class="w-9 h-9" src="./assets/github-logo.png" alt="" />
            <a class="btn btn-ghost text-xl">GitHub Issues Tracker</a>
          </div>
          <div class="flex gap-2">
            <input
              type="text"
              placeholder="Search issues..."
              class="input input-bordered w-24 md:w-auto"
            />
            <button class="btn btn-primary">+ New Issue</button>
          </div>
        </div>
      </nav>
    </header>

    <main class="w-4/5 mx-auto">
      <!-- menu buttons -->
      <section>
        <!-- button container -->
        <div class="p-6 shadow rounded-lg bg-white">
          <button onclick="displayAllCard()" id="allBtn" class="btn btn-wide btn-primary all-btns">All</button>
          <button onclick="displayOpenCard()" id="openBtn" class="btn btn-wide all-btns">Open</button>
          <button onclick="displayCloseCard()" id="closeBtn" class="btn btn-wide all-btns">Closed</button>
        </div>
      </section>
      <!-- Issue counting section -->
      <section>
        <!-- card container -->
        <div
          class="p-6 shadow rounded-t-lg mt-4 flex justify-between items-center bg-white"
        >
          <!-- counting -->
          <div class="flex gap-2 items-center">
            <!-- logo image -->
            <div class="p-2 rounded-full bg-[#ECE4FF]">
              <img class="w-9 h-9" src="./assets/Aperture.png" alt="" />
            </div>
            <!-- content -->
            <div class="">
              <h1 class="text-xl font-semibold"><span id="issue-counts">50</span> Issues</h1>
              <p class="text-[#64748B]">Track and manage your project issues</p>
            </div>
          </div>
          <!-- open & close container -->
          <div class="flex items-center gap-4">
            <div class="flex items-center gap-2">
              <div class="w-3 h-3 rounded-full bg-green-500"></div>
              <p class="font-medium">Open</p>
            </div>
            <div class="flex items-center gap-2">
              <div class="w-3 h-3 rounded-full bg-purple-600"></div>
              <p class="font-medium">Closed</p>
            </div>
          </div>
        </div>
        <!-- spinner -->
        <div id="spinner" class="hidden">
            <section class="flex justify-center items-center py-10">
                <span class="loading loading-spinner loading-xl"></span>
            </section>
        </div>
        <!-- Cards section container -->
        <div
          id="Cards-container"
          class="bg-[#FBFBFB] shadow rounded-b-lg border-t-2 border-gray-200 p-6 grid md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3"
        >
          <!-- Sample card -->
            
        </div>
      </section>
    </main>
    <script src="./scripts/index.js"></script>
  </body>
</html>
