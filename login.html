<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Enter your GitHub Profile</title>
    <!-- Custom css styles link -->
    <link rel="stylesheet" href="./styles/style.css" />
    <!-- tailwind + daisyUi cdn link -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <section>
      <!-- Login container -->
      <div class="rounded-lg shadow max-w-md mx-auto p-8">
        <!-- Logo and title section -->
        <div class="text-center">
          <img class="mx-auto mb-6" src="./assets/github-logo.png" alt="" />
          <h3 class="text-2xl font-semibold mb-1">GitHub Issues Tracker</h3>
          <p class="text-[#64748B]">Sign in to manage your issues</p>
        </div>
        <!-- Login form -->
        <div class="my-6">
          <fieldset class="fieldset p-4">
            <label class="label text-black">Username</label>
            <input
              type="text"
              class="input w-full"
              placeholder="Enter Username"
            />
            <p class="label text-[#4A00FF]">Default: admin</p>

            <label class="label text-black">Password</label>
            <input
              type="password"
              class="input w-full"
              placeholder="Enter Password"
            />
            <p class="label text-[#4A00FF]">Default: admin123</p>

            <button class="btn btn-neutral mt-4">Login</button>
          </fieldset>
        </div>
        <!-- Divider -->
        <div class="flex items-center w-full">
          <div class="grow border-t border-gray-300"></div>
          <span class="mx-4 font-medium">OR</span>
          <div class="grow border-t border-gray-300"></div>
        </div>
        <!-- demo credentails -->
        <div class="my-6">
            <p class="text-center text-[#64748B] text-sm">Demo Credentials:</p>
            <div class="p-6 rounded-lg bg-[#F8FAFC] text-center shadow mt-2">
                <p class="text-sm font-medium">Username: <span class="text-[#64748B] font-light">admin</span></p>
                <p class="text-sm font-medium">Password: <span class="text-[#64748B] font-light">admin123</span></p>
            </div>
        </div>
      </div>
    </section>
  </body>
</html>
